<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gesture Display</title>
    <link rel="stylesheet" href="styles.css?v=20260716-8" />
  </head>
  <body class="display-body">
    <main class="display-stage">
      <section class="display-frame" aria-label="Gesture display area">
        <header class="top-bar">
          <div class="settings-row">
            <label class="setting">
              <span class="setting-label">Algorithm</span>
              <select id="algo-version" class="mode-select" aria-label="Algorithm version"></select>
            </label>
            <label class="setting">
              <span class="setting-label">Mapping</span>
              <select id="mapping-mode" class="mode-select" aria-label="Mapping mode">
                <option value="relative">Relative</option>
                <option value="absolute">Absolute</option>
              </select>
            </label>
            <label class="setting">
              <span class="setting-label">Word start</span>
              <select id="input-mode" class="mode-select" aria-label="Input mode">
                <option value="center">Center</option>
                <option value="continuous">Continuous</option>
              </select>
            </label>
            <label class="setting">
              <span class="setting-label">Trace</span>
              <select id="visual-mode" class="mode-select" aria-label="Visualization mode">
                <option value="cursor">Cursor</option>
                <option value="gesture">Gesture</option>
              </select>
            </label>
            <label class="setting">
              <span class="setting-label">Phone keys</span>
              <select id="mobile-keyboard-mode" class="mode-select" aria-label="Mobile keyboard reference">
                <option value="show">Show</option>
                <option value="hide">Hide</option>
              </select>
            </label>
            <label class="setting">
              <span class="setting-label">Link</span>
              <select id="lan-mode" class="mode-select" aria-label="Gesture transport">
                <option value="server">Server</option>
                <option value="lan">LAN</option>
                <option value="usb">USB</option>
              </select>
            </label>
            <label class="setting" id="usb-setting" hidden>
              <span class="setting-label">USB Device</span>
              <button id="usb-connect" class="mode-select usb-connect" type="button">连接手机</button>
            </label>
          </div>
          <div id="room-code" class="room-code">
            <span class="room-code-label">Session</span>
            <span class="room-code-value">····</span>
            <span class="room-code-status">waiting for phone…</span>
          </div>
        </header>
        <div class="text-row">
          <div id="decoded-text" class="decoded-text" aria-live="polite"></div>
          <div id="letter-badge" class="letter-badge" aria-hidden="true"></div>
        </div>
        <div class="keyboard-shell">
          <div id="candidate-strip" class="candidate-strip" aria-label="Word candidates and actions"></div>
          <div class="keyboard-row">
            <div class="key" data-key="Q">Q</div>
            <div class="key" data-key="W">W</div>
            <div class="key" data-key="E">E</div>
            <div class="key" data-key="R">R</div>
            <div class="key" data-key="T">T</div>
            <div class="key" data-key="Y">Y</div>
            <div class="key" data-key="U">U</div>
            <div class="key" data-key="I">I</div>
            <div class="key" data-key="O">O</div>
            <div class="key" data-key="P">P</div>
          </div>
          <div class="keyboard-row keyboard-row-offset-sm">
            <div class="key" data-key="A">A</div>
            <div class="key" data-key="S">S</div>
            <div class="key" data-key="D">D</div>
            <div class="key" data-key="F">F</div>
            <div class="key key-anchor" data-key="G">G</div>
            <div class="key" data-key="H">H</div>
            <div class="key" data-key="J">J</div>
            <div class="key" data-key="K">K</div>
            <div class="key" data-key="L">L</div>
          </div>
          <div class="keyboard-row keyboard-row-offset-lg">
            <div class="key" data-key="Z">Z</div>
            <div class="key" data-key="X">X</div>
            <div class="key" data-key="C">C</div>
            <div class="key" data-key="V">V</div>
            <div class="key" data-key="B">B</div>
            <div class="key" data-key="N">N</div>
            <div class="key" data-key="M">M</div>
          </div>
        </div>
        <div id="cursor-marker" class="cursor-marker" aria-hidden="true"></div>
        <canvas id="display-canvas"></canvas>
        <div id="build-badge" class="build-badge" aria-hidden="true"></div>
        <div id="lan-badge" class="lan-badge" aria-hidden="true">LAN ⚡</div>
        <div id="usb-status" class="usb-status" aria-live="polite" hidden></div>
      </section>
    </main>
    <script src="config.js?v=20260716-8"></script>
    <script src="vendor/adb.bundle.js?v=20260716-8"></script>
    <script src="display.js?v=20260716-8"></script>
  </body>
  </html>
